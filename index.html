<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 產生器 - 宜仁居家有限公司</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 QRCode.js 函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <!-- 標題與品牌 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">QR Code 產生器</h1>
            <p class="text-sm text-blue-600 font-medium mt-1">宜仁居家有限公司 技術支援</p>
        </div>

        <!-- 輸入區域 -->
        <div class="space-y-4">
            <div>
                <label for="url-input" class="block text-sm font-medium text-gray-700 mb-1">請輸入網址或文字</label>
                <input type="text" id="url-input" 
                    placeholder="https://www.example.com" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                >
            </div>

            <button onclick="generateQR()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg active:transform active:scale-95">
                生成 QR Code
            </button>
        </div>

        <!-- 結果顯示區 -->
        <div id="result-container" class="hidden mt-8 text-center space-y-6">
            <div id="qrcode" class="flex justify-center"></div>
            
            <div class="flex gap-2">
                <button onclick="downloadQR()" 
                    class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    下載圖片
                </button>
                <button onclick="clearAll()" 
                    class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded-lg transition-colors">
                    重置
                </button>
            </div>
        </div>

        <!-- 頁尾：已更新年份至 2026 -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">© 2026 宜仁居家有限公司 | AI 影片生成講師推薦工具</p>
        </div>
    </div>

    <script>
        let qrcode = null;

        function generateQR() {
            const input = document.getElementById('url-input').value.trim();
            const qrcodeElement = document.getElementById('qrcode');
            const resultContainer = document.getElementById('result-container');

            if (!input) {
                showToast("請輸入內容！");
                return;
            }

            // 清除舊的 QR Code
            qrcodeElement.innerHTML = "";
            
            // 生成新 QR Code
            qrcode = new QRCode(qrcodeElement, {
                text: input,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // 顯示容器
            resultContainer.classList.remove('hidden');
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');
            if (!qrImg) return;

            const link = document.createElement('a');
            link.href = qrImg.src;
            link.download = 'qrcode-' + Date.now() + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearAll() {
            document.getElementById('url-input').value = "";
            document.getElementById('qrcode').innerHTML = "";
            document.getElementById('result-container').classList.add('hidden');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full shadow-lg text-sm";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        document.getElementById('url-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });
    </script>
</body>
</html>
